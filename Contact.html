<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact – PensaWay</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: #f7f7f7;
            color: #333;
        }

        header {
            background: #1a1a1a;
            color: white;
            padding: 20px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
            font-weight: bold;
        }

        nav a:hover,
        nav .active {
            text-decoration: underline;
        }

        main {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
        }

        h2 {
            margin-bottom: 10px;
        }

        form {
            max-width: 600px;
            margin: 30px 0;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        label {
            font-weight: bold;
        }

        input, textarea {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 1rem;
        }

        button {
            background: #1a1a1a;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
        }

        button:hover {
            background: #333;
        }

        .status {
            margin-top: 10px;
            font-weight: bold;
        }

        .location {
            margin-top: 40px;
        }

        footer {
            text-align: center;
            padding: 20px;
            background: #1a1a1a;
            color: white;
            margin-top: 40px;
        }
    </style>
</head>

<body>
    <header>
        <h1>PensaWay</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="services.html">Services</a>
            <a href="contact.html" class="active">Contact</a>
        </nav>
    </header>

    <main>
        <h2>Contact Us</h2>
        <p>Request aircraft rental, book a discovery flight, or inquire about training using the form below.</p>

        <form id="contactForm" action="https://formspree.io/f/mwvwzwow" method="POST">
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" required>

            <label for="email">Email Address</label>
            <input type="email" id="email" name="_replyto" required>

            <label for="message">Message</label>
            <textarea id="message" name="message" rows="6" required></textarea>

            <button type="submit">Send Message</button>

            <p id="formStatus" class="status"></p>
        </form>

        <section class="location">
            <h3>Operating Location</h3>
            <p>Roscoe Field (82J)</p>
            <p>9750 Aileron Ave<br>Pensacola, FL 32506</p>
        </section>
    </main>

    <footer>
        <p>© 2026 PensaWay</p>
    </footer>

    <script>
        const form = document.getElementById("contactForm");
        const status = document.getElementById("formStatus");

        form.addEventListener("submit", async (e) => {
            e.preventDefault();
            status.textContent = "Sending...";

            const data = new FormData(form);

            const response = await fetch(form.action, {
                method: "POST",
                body: data,
                headers: { "Accept": "application/json" }
            });

            if (response.ok) {
                status.textContent = "Message sent successfully. We will get back to you shortly.";
                form.reset();
            } else {
                status.textContent = "There was an issue sending your message. Please try again.";
            }
        });
    </script>
</body>
</html>
